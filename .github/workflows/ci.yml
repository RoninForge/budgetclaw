name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - name: Verify go.mod
        run: go mod verify
      - name: Vet
        run: go vet ./...
      - name: Test with race detector and coverage
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.txt
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - name: golangci-lint
        # v9 of the action supports golangci-lint v2, which is
        # built with Go 1.25+ and compatible with our go.mod.
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  pricing-codegen:
    name: Pricing codegen is fresh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      # Regenerate the embedded pricing table from the vendored,
      # pinned ai-price-index artifacts (offline; no -fetch, no network)
      # and fail if the committed internal/pricing/table_gen.go drifted
      # from what the dataset produces. This keeps the embedded rates
      # hermetic: the binary's prices always match the vendored data.
      - name: go generate
        run: go generate ./...
      - name: Fail if generated code is stale
        run: git diff --exit-code

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true
      - name: Build
        run: make build
      - name: Smoke test binary
        run: ./bin/budgetclaw version
