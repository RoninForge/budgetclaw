name: pricing-cross-check

# Cross-checks the embedded pricing table against the
# community-maintained model_prices_and_context_window.json from
# BerriAI/litellm. Detects price drift on existing model IDs that
# the model-audit workflow cannot catch (since /v1/models is
# metadata only).
#
# When an Anthropic model in our table disagrees with LiteLLM on
# input or output rate, an issue is opened so a maintainer can
# verify against docs.anthropic.com/en/docs/about-claude/pricing
# and ship a patch. Detection is automated; the rate value still
# requires human verification before it lands in pricing.go.

on:
  schedule:
    # Daily at 14:30 UTC. Offset 30 minutes from the model audit so
    # we don't double-load the same minute.
    - cron: '30 14 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: pricing-cross-check
  cancel-in-progress: false

jobs:
  cross-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Build budgetclaw
        run: make build

      - name: Snapshot embedded rates
        run: ./bin/budgetclaw pricing rates --json > ours.json

      - name: Fetch LiteLLM model prices
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/BerriAI/litellm/main/litellm/model_prices_and_context_window_backup.json" \
            > litellm.json
          echo "LiteLLM JSON fetched ($(wc -c < litellm.json) bytes)."

      - name: Cross-check rates
        id: diff
        run: |
          python3 - <<'PY' > diff.json
          import json
          import os
          import sys

          with open("ours.json") as f:
              ours = json.load(f)
          with open("litellm.json") as f:
              litellm = json.load(f)

          tolerance = 0.01  # USD per MTok. Whole-dollar pricing means
                            # any real change is at least $0.50, so 1c
                            # tolerance is safe for float wobble.

          mismatches = []
          for row in ours:
              model = row["model"]
              ours_in = row["input_per_mtok"]
              ours_out = row["output_per_mtok"]

              # LiteLLM uses bare ID and 'anthropic/<id>'; try both.
              entry = litellm.get(model) or litellm.get(f"anthropic/{model}")
              if entry is None:
                  # Not in LiteLLM, can't cross-check. Skip silently
                  # so dated variants the community hasn't catalogued
                  # do not generate noise.
                  continue

              ll_in = entry.get("input_cost_per_token", 0) * 1_000_000
              ll_out = entry.get("output_cost_per_token", 0) * 1_000_000

              in_mismatch = abs(ll_in - ours_in) > tolerance
              out_mismatch = abs(ll_out - ours_out) > tolerance
              if in_mismatch or out_mismatch:
                  mismatches.append({
                      "model": model,
                      "ours_in": ours_in,
                      "ours_out": ours_out,
                      "ll_in": ll_in,
                      "ll_out": ll_out,
                      "in_mismatch": in_mismatch,
                      "out_mismatch": out_mismatch,
                  })

          json.dump(mismatches, sys.stdout)
          PY

          count=$(jq 'length' diff.json)
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq 0 ]; then
            echo "Pricing table agrees with LiteLLM. No drift detected."
          else
            list=$(jq -r '[.[].model] | join(", ")' diff.json)
            echo "list=$list" >> "$GITHUB_OUTPUT"
            echo "Detected rate disagreement(s) for: $list"
            echo "--- mismatches ---"
            cat diff.json | jq .
          fi

      - name: Open issue if drift detected
        if: steps.diff.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODELS: ${{ steps.diff.outputs.list }}
        run: |
          title="pricing: rate disagreement vs LiteLLM for $MODELS"

          existing=$(gh issue list --state open --search "$title in:title" --json number --jq '. | length')
          if [ "$existing" -gt 0 ]; then
            echo "Open issue with matching title already exists; skipping."
            exit 0
          fi

          # Build a Markdown table of the deltas.
          table=$(jq -r '
            "| Model | Ours (in / out per MTok) | LiteLLM (in / out per MTok) | Status |\n|---|---|---|---|\n" +
            (map(
              "| `\(.model)` | $\(.ours_in) / $\(.ours_out) | $\(.ll_in) / $\(.ll_out) | " +
              (if .in_mismatch and .out_mismatch then "input + output mismatch"
               elif .in_mismatch then "input mismatch"
               else "output mismatch" end) +
              " |"
            ) | join("\n"))
          ' diff.json)

          body=$(cat <<EOF
          The daily \`pricing-cross-check\` workflow detected rate disagreements between the embedded pricing table and BerriAI/litellm's [\`model_prices_and_context_window.json\`](https://github.com/BerriAI/litellm/blob/main/litellm/model_prices_and_context_window_backup.json).

          $table

          **What to do**

          1. Verify the affected rate(s) on the [Anthropic pricing page](https://docs.anthropic.com/en/docs/about-claude/pricing).
          2. If LiteLLM is right, update \`internal/pricing/pricing.go\` and the corresponding test case in \`internal/pricing/pricing_test.go\`. Bump the "Last updated" date.
          3. If our rate is right and LiteLLM is stale, no action -- the next LiteLLM update will close the gap.
          4. After a price correction lands, users on the prior version need to run \`budgetclaw backfill --rebuild\` to recompute historical rollups; without that, idempotent inserts leave the old rate baked into existing rows.

          **Why this is not auto-fixed**

          Pricing is the load-bearing input for the \`kill\` action. A wrong auto-merged rate could fire kills too early or too late. Detection is automated; the rate value remains a human verification step.

          Generated by \`.github/workflows/pricing-cross-check.yml\`.
          EOF
          )

          gh issue create \
            --title "$title" \
            --body "$body"
