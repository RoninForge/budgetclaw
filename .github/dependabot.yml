version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: scope
